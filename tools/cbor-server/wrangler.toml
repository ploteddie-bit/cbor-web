# wrangler.toml — Cloudflare Worker deployment config
# Deploy: npx wrangler deploy

name = "cbor-web"
main = "worker.js"
compatibility_date = "2026-04-25"

# Static assets — HTML + CBOR files from cbor-web-sites or cbor-web-showcase
# Upload with: npx wrangler r2 object put <bucket>/<path> --file <local-file>
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "cbor-web-assets"

# Origin server (Rust cbor-server proxied via CF Tunnel)
# Set with: npx wrangler secret put ORIGIN_URL
# Value: http://serveur-dev.internal:3001 (internal CF Tunnel hostname)

# Routes — attach to domains
# npx wrangler routes add cbor-web.com/*
# npx wrangler routes add cbor-web.fr/*
# etc.

[env.production]
# Production-specific config
