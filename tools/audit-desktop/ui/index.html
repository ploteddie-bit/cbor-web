<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>CBOR-Web Audit v2.0</title>
<style>
:root{--bg:#0a0d16;--fg:#e8ecf4;--fg2:#8892b0;--accent:#00e5ff;--orange:#d4540b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:var(--bg);color:var(--fg);padding:24px}
h1{color:var(--orange);margin-bottom:4px}
h1 span{color:var(--accent)}
.sub{color:var(--fg2);margin-bottom:24px}
.toolbar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
input{flex:1;min-width:200px;padding:10px;background:#000;border:1px solid #333;border-radius:6px;color:var(--fg);font-family:monospace}
button{padding:10px 20px;background:var(--orange);color:#fff;border:none;border-radius:6px;font-weight:700;cursor:pointer}
button:hover{opacity:.9}
button.blue{background:var(--accent);color:#000}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:20px}
.card h3{font-size:.9rem;margin-bottom:8px;color:var(--accent)}
.result{font-size:.8rem;color:var(--fg2);max-height:400px;overflow-y:auto;margin-top:16px;font-family:monospace;background:#000;padding:16px;border-radius:8px}
.foot{margin-top:24px;color:#444;font-size:.7rem;text-align:center}
</style></head>
<body>
<h1>CBOR-Web <span>Audit</span> v2.0</h1>
<p class="sub">Desktop Edition — SEO · GEO · CBOR-Web · Site Crawl · Competitor · Backlinks</p>

<div class="toolbar">
  <input id="url" placeholder="https://example.com" value="https://">
  <button onclick="runAudit()">🔍 Audit</button>
  <button class="blue" onclick="runCrawl()">🔄 Full Crawl</button>
  <button onclick="exportHTML()">📄 Export</button>
</div>

<div class="grid">
  <div class="card"><h3>📊 Score</h3><div id="score" style="font-size:3rem;font-weight:800;color:var(--accent)">—</div></div>
  <div class="card"><h3>📦 CBOR-Web</h3><div id="cbor-check">Enter a URL and click Audit</div></div>
  <div class="card"><h3>🔄 Pages</h3><div id="page-count">—</div></div>
  <div class="card"><h3>⚠️ Issues</h3><div id="issue-count">—</div></div>
</div>

<div class="result" id="output">Ready. Enter a URL above and click Audit to begin.</div>

<div class="foot">CBOR-Web Audit v2.0 · Rust/WASM · Windows + Linux · ExploDev 2026</div>

<script src="audit.js"></script>
</body>
</html>
