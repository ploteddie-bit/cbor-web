name: CBOR-Web CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check CDDL schemas exist
        run: |
          for f in schemas/cbor-web-core.cddl schemas/cbor-web-security.cddl schemas/cbor-web-multimedia.cddl schemas/cbor-web-generative.cddl schemas/cbor-web-unified.cddl; do
            if [ ! -f "$f" ]; then echo "Missing: $f" && exit 1; fi
            echo "OK: $f"
          done

      - name: Check test vectors exist
        run: |
          for f in test-vectors/tv1_manifest.cbor test-vectors/tv2_page.cbor test-vectors/tv3_product.cbor test-vectors/tv4_bundle.cbor test-vectors/tv5_navigation.cbor; do
            if [ ! -f "$f" ]; then echo "Missing: $f" && exit 1; fi
            echo "OK: $f ($(wc -c < $f) bytes)"
          done

      - name: Verify test vectors have self-described CBOR tag
        run: |
          for f in test-vectors/*.cbor; do
            MAGIC=$(xxd -p -l3 "$f")
            if [ "$MAGIC" != "d9d9f7" ]; then
              echo "ERROR: $f missing self-described CBOR tag (got $MAGIC)"
              exit 1
            fi
            echo "OK: $f has CBOR self-described tag"
          done

      - name: Check no internal references remain
        run: |
          if grep -r "DIRECTIVE-CLAUDE\|Co-Authored-By: Claude\|explodev/cbor-web" --include="*.md" .; then
            echo "ERROR: Found internal or incorrect references"
            exit 1
          fi
          echo "No internal references found"

      - name: Check LICENSE exists
        run: test -f LICENSE && echo "LICENSE OK"

      - name: Check CONTRIBUTING.md exists
        run: test -f CONTRIBUTING.md && echo "CONTRIBUTING.md OK"

      - name: Verify PROOF.md hashes with sha256sum
        run: |
          cd "$GITHUB_WORKSPACE"
          # Extract hash block and verify all 7 documents
          sed -n '/^```$/,/^```$/p' PROOF.md | grep '^[a-f0-9]\{64\} ' | tee /tmp/proof-hashes.txt
          sha256sum --check /tmp/proof-hashes.txt --status || { echo "ERROR: PROOF.md hash mismatch"; sha256sum --check /tmp/proof-hashes.txt; exit 1; }
          echo "PROOF.md all hashes OK"

  build-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build cbor-crawl
        working-directory: tools/cbor-crawl
        run: cargo check && cargo clippy -- -D warnings

      - name: Build text2cbor
        working-directory: tools/text2cbor
        run: cargo check && cargo clippy -- -D warnings

      - name: Build cbor-vectors
        working-directory: tools/cbor-vectors
        run: cargo check && cargo clippy -- -D warnings

      - name: Build cbor-server
        working-directory: tools/cbor-server
        run: cargo check && cargo clippy -- -D warnings

      - name: Check formatting
        run: cargo fmt --check || true
        working-directory: tools/cbor-crawl

      - name: Run cbor-vectors
        working-directory: tools/cbor-vectors
        run: cargo run -- --output /tmp/tv && ls -la /tmp/tv/

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check spec documents are not empty
        run: |
          for f in CBOR-WEB-*.md; do
            SIZE=$(wc -c < "$f")
            if [ "$SIZE" -lt 1000 ]; then
              echo "ERROR: $f seems too small ($SIZE bytes)"
              exit 1
            fi
            echo "OK: $f ($SIZE bytes)"
          done
